name: Release

"on":
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
          - os: windows-latest
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install JS dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Modbus Tester ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package portable app (macOS)
        if: runner.os == 'macOS'
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/macos
          zip -r "$GITHUB_WORKSPACE/Modbus_Tester_${{ github.ref_name }}_macos_portable.zip" "Modbus Tester.app"
          gh release upload ${{ github.ref_name }} "$GITHUB_WORKSPACE/Modbus_Tester_${{ github.ref_name }}_macos_portable.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package portable exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "src-tauri\target\release\modbus-tester.exe" `
            -DestinationPath "Modbus_Tester_${{ github.ref_name }}_windows_portable.zip"
          gh release upload ${{ github.ref_name }} "Modbus_Tester_${{ github.ref_name }}_windows_portable.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
